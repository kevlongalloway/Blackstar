name: Scrape Shopify Products

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run scraper
        run: node scraper.js

      - name: Commit and push if products changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet products.json; then
            echo "No changes to products.json"
          else
            git add products.json
            git commit -m "Update products from Shopify scraper"
            git push
          fi
