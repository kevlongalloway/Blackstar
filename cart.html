<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — BLACKSTAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- Stripe.js — loads the Stripe SDK (required for Apple Pay) -->
  <script src="https://js.stripe.com/v3/" async></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #f0ede8;
      font-family: 'Space Mono', monospace;
      cursor: crosshair;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    @media (min-width: 640px) { nav { padding: 28px 40px; } }
    .nav-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      opacity: 0.8;
      text-decoration: none;
      color: #f0ede8;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      font-size: 10px;
      color: #f0ede8;
      text-decoration: none;
      letter-spacing: 0.2em;
      opacity: 0.5;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-links a.active { opacity: 1; }

    /* Page */
    .cart-page {
      padding: 120px 24px 80px;
      max-width: 800px;
      margin: 0 auto;
    }
    @media (min-width: 640px) { .cart-page { padding: 120px 40px 80px; } }

    .page-label {
      font-size: 9px;
      letter-spacing: 0.35em;
      opacity: 0.35;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 9vw, 100px);
      line-height: 0.92;
      margin-bottom: 48px;
    }

    /* Empty */
    .empty-state {
      text-align: center;
      padding: 80px 0;
    }
    .empty-state p {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.3;
      margin-bottom: 32px;
    }
    .empty-state a {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #f0ede8;
      text-decoration: none;
      border-bottom: 1px solid rgba(240,237,232,0.25);
      padding-bottom: 2px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .empty-state a:hover { opacity: 1; }

    /* Cart items */
    .cart-items {
      border-top: 1px solid rgba(240,237,232,0.08);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(240,237,232,0.08);
    }

    .cart-item-img {
      aspect-ratio: 3/4;
      background: #121212;
      overflow: hidden;
    }
    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item-name {
      font-size: 10px;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .cart-item-price {
      font-size: 10px;
      opacity: 0.4;
      margin-bottom: 12px;
    }

    .qty-row {
      display: flex;
      align-items: center;
      width: fit-content;
      border: 1px solid rgba(240,237,232,0.15);
    }
    .qty-btn {
      background: none;
      border: none;
      color: #f0ede8;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      width: 36px;
      height: 36px;
      cursor: crosshair;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .qty-btn:hover { opacity: 1; }
    .qty-display {
      width: 36px;
      height: 36px;
      text-align: center;
      line-height: 36px;
      font-size: 11px;
      border-left: 1px solid rgba(240,237,232,0.15);
      border-right: 1px solid rgba(240,237,232,0.15);
    }

    .cart-item-subtotal {
      font-size: 11px;
      letter-spacing: 0.05em;
      text-align: right;
    }
    .cart-item-remove {
      display: block;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.25;
      cursor: crosshair;
      background: none;
      border: none;
      color: #f0ede8;
      font-family: 'Space Mono', monospace;
      margin-top: 6px;
      transition: opacity 0.2s;
      text-align: right;
    }
    .cart-item-remove:hover { opacity: 0.7; }

    /* Summary */
    .cart-summary {
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid rgba(240,237,232,0.08);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      opacity: 0.5;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
      padding-top: 12px;
      border-top: 1px solid rgba(240,237,232,0.08);
    }
    .summary-total-label { opacity: 0.6; text-transform: uppercase; font-size: 9px; letter-spacing: 0.25em; }

    /* Checkout section */
    .checkout-section { margin-top: 32px; }

    /* Apple Pay / Google Pay button area */
    #payment-request-wrapper {
      display: none;
      margin-bottom: 16px;
    }
    #payment-request-button {
      /* Stripe mounts the Apple Pay / Google Pay button here */
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 16px 0;
      display: none; /* shown when Apple Pay is available */
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(240,237,232,0.1);
    }
    .divider span {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.25;
    }
    #divider { display: none; }

    .btn-checkout {
      width: 100%;
      background: #f0ede8;
      color: #080808;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 18px;
      cursor: crosshair;
      transition: opacity 0.2s;
      display: block;
      text-align: center;
      text-decoration: none;
    }
    .btn-checkout:hover { opacity: 0.8; }
    .btn-checkout:disabled { opacity: 0.35; cursor: not-allowed; }

    .checkout-note {
      font-size: 9px;
      opacity: 0.25;
      text-align: center;
      letter-spacing: 0.12em;
      margin-top: 16px;
    }

    /* Error */
    .checkout-error {
      font-size: 9px;
      letter-spacing: 0.12em;
      color: #e84040;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    /* Footer */
    footer {
      background: #f0ede8;
      color: #080808;
      padding: 60px 24px 36px;
    }
    @media (min-width: 640px) { footer { padding: 60px 40px 36px; } }
    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(8,8,8,0.12);
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 24px;
    }
    footer img { width: 200px; }
    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .footer-links a {
      font-size: 10px;
      color: #080808;
      text-decoration: none;
      letter-spacing: 0.15em;
      opacity: 0.4;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .footer-links a:hover { opacity: 1; }
    .footer-copy { font-size: 9px; opacity: 0.3; letter-spacing: 0.1em; }

    .footer-bottom {
      background: #080808;
      color: #f0ede8;
      text-align: center;
      padding: 12px 16px;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .footer-bottom a { color: inherit; text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-mark" href="index.html">BST★</a>
    <div class="nav-links">
      <a href="products.html">Shop</a>
      <a href="#">Drops</a>
      <a href="#">About</a>
      <a href="cart.html" class="active cart-nav-link">Cart</a>
    </div>
  </nav>

  <div class="cart-page">
    <p class="page-label">— Your Order</p>
    <h1 class="page-title">CART</h1>
    <div id="cart-body"></div>
  </div>

  <footer>
    <div class="footer-top">
      <img src="IMG_1309.png" alt="BLACKSTAR">
      <div class="footer-links">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">Sizing</a>
        <a href="#">Returns</a>
      </div>
    </div>
    <p class="footer-copy">© 2026 BLACKSTAR</p>
  </footer>

  <div class="footer-bottom">
    © 2026, BlackStar the Brand Powered by <a href="https://upcart.online" target="_blank" rel="noopener">upcart.online</a>
  </div>

  <script src="config.js"></script>
  <script src="cart.js"></script>
  <script>
    // ─── RENDER CART ──────────────────────────────────────────────────────────
    function renderCart() {
      const cart = getCart();
      const body = document.getElementById('cart-body');

      if (cart.length === 0) {
        body.innerHTML = `
          <div class="empty-state">
            <p>Your cart is empty</p>
            <a href="products.html">Continue Shopping →</a>
          </div>`;
        return;
      }

      const currency = cart[0].currency || 'usd';
      const subtotal = getCartTotal();

      body.innerHTML = `
        <div class="cart-items">
          ${cart.map(item => {
          const lId = item.lineId || item.productId;
          return `
            <div class="cart-item" data-id="${lId}">
              <div class="cart-item-img">
                ${item.image
                  ? `<img src="${item.image}" alt="${item.name}" loading="lazy">`
                  : ''}
              </div>
              <div>
                <p class="cart-item-name">${item.name}${item.size ? ' — ' + item.size : ''}</p>
                <p class="cart-item-price">${formatPrice(item.price, item.currency)}</p>
                <div class="qty-row">
                  <button class="qty-btn" data-action="minus" data-id="${lId}">−</button>
                  <span class="qty-display">${item.quantity}</span>
                  <button class="qty-btn" data-action="plus" data-id="${lId}">+</button>
                </div>
              </div>
              <div>
                <p class="cart-item-subtotal">${formatPrice(item.price * item.quantity, item.currency)}</p>
                <button class="cart-item-remove" data-id="${lId}">Remove</button>
              </div>
            </div>`;
        }).join('')}
        </div>

        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span>${formatPrice(subtotal, currency)}</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>Calculated at checkout</span>
          </div>
          <div class="summary-total">
            <span class="summary-total-label">Total</span>
            <span>${formatPrice(subtotal, currency)}</span>
          </div>
        </div>

        <div class="checkout-section">
          <!-- Apple Pay / Google Pay button — shown only when available -->
          <div id="payment-request-wrapper">
            <div id="payment-request-button"></div>
          </div>
          <div id="divider" class="divider"><span>or</span></div>

          <!-- Stripe-hosted checkout (supports Apple Pay on Stripe's page too) -->
          <button class="btn-checkout" id="btn-checkout">Checkout</button>
          <p class="checkout-error" id="checkout-error"></p>
          <p class="checkout-note">Secure checkout via Stripe</p>
        </div>`;

      // Quantity / remove event listeners
      body.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id   = btn.dataset.id;
          const item = getCart().find(i => (i.lineId || i.productId) === id);
          if (!item) return;
          if (btn.dataset.action === 'minus') setQuantity(id, item.quantity - 1);
          else setQuantity(id, item.quantity + 1);
        });
      });
      body.querySelectorAll('.cart-item-remove').forEach(btn => {
        btn.addEventListener('click', () => removeFromCart(btn.dataset.id));
      });

      // Checkout button
      document.getElementById('btn-checkout').addEventListener('click', hostedCheckout);

      // Init Apple Pay button
      initPaymentRequest(cart, subtotal, currency);
    }

    // ─── STRIPE PAYMENT REQUEST BUTTON (Apple Pay / Google Pay) ───────────────
    // This shows a native Apple Pay sheet on Safari/iOS and Google Pay on Chrome.
    //
    // IMPORTANT — Apple Pay domain verification:
    // For Apple Pay to work on your own domain you must verify it in the Stripe
    // Dashboard: Settings → Payment methods → Apple Pay → Add domain.
    // Stripe will give you a file to host at:
    //   /.well-known/apple-developer-merchantid-domain-association
    // On Render (static site), add this file to the root of your repo.
    //
    async function initPaymentRequest(cart, amount, currency) {
      // Wait for Stripe.js to load (it loads async)
      let attempts = 0;
      while (typeof Stripe === 'undefined' && attempts < 20) {
        await new Promise(r => setTimeout(r, 200));
        attempts++;
      }
      if (typeof Stripe === 'undefined') return;

      try {
        // Create a payment intent to get the publishable key
        const items = cart.map(i => ({ productId: i.productId, quantity: i.quantity }));
        const res   = await fetch('https://ecommaxxing.kevlongalloway1999m.workers.dev/checkout/intent', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ items }),
        });
        const body = await res.json();
        if (!body.ok) return; // Stripe not configured yet, skip silently

        const { clientSecret, publishableKey, amount: intentAmount, currency: intentCurrency } = body.data;

        const stripe = Stripe(publishableKey);

        const pr = stripe.paymentRequest({
          country:           'US',
          currency:          intentCurrency,
          total:             { label: 'BLACKSTAR', amount: intentAmount },
          requestPayerName:  true,
          requestPayerEmail: true,
        });

        const elements = stripe.elements();
        const prButton = elements.create('paymentRequestButton', {
          paymentRequest: pr,
          style: {
            paymentRequestButton: {
              type:   'buy',
              theme:  'dark',
              height: '52px',
            },
          },
        });

        const result = await pr.canMakePayment();
        if (result) {
          // Apple Pay or Google Pay is available — show the button
          const wrapper = document.getElementById('payment-request-wrapper');
          const divider = document.getElementById('divider');
          if (wrapper) wrapper.style.display = 'block';
          if (divider) divider.style.display  = 'flex';
          prButton.mount('#payment-request-button');
        }

        // Handle the native payment sheet completion
        pr.on('paymentmethod', async (ev) => {
          // Confirm the PaymentIntent using the payment method from the sheet
          const { error: confirmError, paymentIntent } = await stripe.confirmCardPayment(
            clientSecret,
            { payment_method: ev.paymentMethod.id },
            { handleActions: false } // we'll handle 3DS ourselves
          );

          if (confirmError) {
            ev.complete('fail');
            showCheckoutError(confirmError.message);
            return;
          }

          ev.complete('success');

          if (paymentIntent.status === 'requires_action') {
            // 3D Secure required
            const { error } = await stripe.confirmCardPayment(clientSecret);
            if (error) { showCheckoutError(error.message); return; }
          }

          // Payment successful
          clearCart();
          window.location.href = 'index.html?payment=success';
        });

      } catch (err) {
        // Non-critical: Apple Pay setup failed silently
        console.warn('Payment Request init failed:', err.message);
      }
    }

    // ─── STRIPE HOSTED CHECKOUT ───────────────────────────────────────────────
    async function hostedCheckout() {
      const btn = document.getElementById('btn-checkout');
      btn.disabled = true;
      btn.textContent = 'Redirecting…';
      hideCheckoutError();

      const cart  = getCart();
      const items = cart.map(i => ({
        productId: i.productId,
        quantity:  i.quantity,
        name:      i.name + (i.size ? ' — ' + i.size : ''),
      }));

      try {
        const res  = await fetch('https://ecommaxxing.kevlongalloway1999m.workers.dev/checkout/session', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            items,
            successUrl: window.location.origin + '/index.html?payment=success',
            cancelUrl:  window.location.href,
          }),
        });
        const body = await res.json();
        if (!body.ok) throw new Error(body.error || 'Checkout failed');
        window.location.href = body.data.url;
      } catch (err) {
        showCheckoutError(err.message);
        btn.disabled    = false;
        btn.textContent = 'Checkout';
      }
    }

    function showCheckoutError(msg) {
      const el = document.getElementById('checkout-error');
      if (el) { el.textContent = msg; el.style.display = 'block'; }
    }
    function hideCheckoutError() {
      const el = document.getElementById('checkout-error');
      if (el) el.style.display = 'none';
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    window.addEventListener('bst:cart-updated', renderCart);
    document.addEventListener('DOMContentLoaded', renderCart);
  </script>

</body>
</html>
