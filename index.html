  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow-x: hidden;
    }

    body {
      background: #080808;
      color: #f0ede8;
      font-family: 'Space Mono', monospace;
      cursor: crosshair;
      overflow-x: hidden;
      width: 100%;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      opacity: 0.8;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      font-size: 10px;
      color: #f0ede8;
      text-decoration: none;
      letter-spacing: 0.2em;
      opacity: 0.5;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }

    /* Hero */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .hero-logo {
      position: relative;
      width: min(680px, 82vw);
    }

    .logo-sizer {
      width: 100%;
      display: block;
      visibility: hidden;
    }

    .logo-clip {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      clip-path: inset(0 var(--cr) 0 var(--cl));
      animation: clip-slam 0.2s cubic-bezier(0.6, 0, 0.1, 1) var(--d) both;
    }

    @keyframes clip-slam {
      0% {
        opacity: 0;
        transform: translateY(-22px) rotate(calc(var(--rot) * 2)) scale(1.04);
      }
      65% {
        opacity: 1;
        transform: translateY(1px) rotate(var(--rot)) scale(0.995);
      }
      100% {
        opacity: 1;
        transform: translateY(0) rotate(var(--rot)) scale(1);
      }
    }

    .hero-sub {
      font-size: 10px;
      letter-spacing: 0.4em;
      opacity: 0.35;
      margin-top: 40px;
      text-transform: uppercase;
    }

    .hero-icon {
      position: absolute;
      bottom: 14%;
      right: 7%;
      width: 90px;
      opacity: 0.06;
    }

    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.3em;
      opacity: 0.25;
      text-transform: uppercase;
    }

    /* Hero video */
    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .hero-video.visible {
      opacity: 1;
    }

    /* Ticker */
    .ticker {
      overflow: hidden;
      background: #f0ede8;
      padding: 11px 0;
      white-space: nowrap;
    }

    .ticker-inner {
      display: inline-flex;
      animation: tick 18s linear infinite;
    }

    .ticker-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: #080808;
      padding: 0 32px;
      letter-spacing: 0.15em;
    }

    @keyframes tick {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* Shop section */
    .shop {
      padding: 80px 24px;
    }

    @media (min-width: 640px) {
      .shop { padding: 100px 40px; }
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }

    .shop-label {
      font-size: 9px;
      letter-spacing: 0.35em;
      opacity: 0.35;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .shop-title {

      font-size: clamp(48px, 9vw, 120px);
      line-height: 0.92;
    }

    .shop-all-link {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #f0ede8;
      text-decoration: none;
      opacity: 0.45;
      border-bottom: 1px solid rgba(240,237,232,0.25);
      padding-bottom: 2px;
      white-space: nowrap;
      transition: opacity 0.2s;
      flex-shrink: 0;
      margin-bottom: 6px;
    }

    .shop-all-link:hover { opacity: 1; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
    }

    .card {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card-img {
      aspect-ratio: 3/4;
      background: #121212;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img img {
      transform: scale(1.06);
    }

    .card-info {
      padding: 12px 2px 4px;
    }

    .card-name {
      display: block;
      font-size: 10px;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

    .card-price {

    /* Shop all CTA */

    .shop-cta-btn {

    /* Footer */

      text-decoration: underline;
    }
  </style>

  <script>
    // Show payment success toast if redirected back from Stripe
    (function checkPaymentSuccess() {
      const params = new URLSearchParams(location.search);
      if (params.get('payment') === 'success') {
        clearCart();
        history.replaceState({}, '', location.pathname);
        const toast = document.createElement('div');
        toast.style.cssText = [
          'position:fixed','bottom:32px','left:50%',
          'transform:translateX(-50%)','background:#f0ede8',
          'color:#080808','font-family:Space Mono,monospace',
          'font-size:10px','letter-spacing:0.15em','text-transform:uppercase',
          'padding:14px 28px','z-index:999','white-space:nowrap',
          'transition:opacity 0.5s'
        ].join(';');
        toast.textContent = 'Order confirmed — thank you!';
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; }, 3500);
        setTimeout(() => toast.remove(), 4200);
      }
    })();

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      try {
        const res  = await fetch('https://ecommaxxing.kevlongalloway1999m.workers.dev/products?limit=6');
        const body = await res.json();
        if (!body.ok) throw new Error(body.error);
        const products = body.data.slice(0, 6);
        if (products.length === 0) {
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;opacity:0.5;">No products available.</p>';
          return;
        }
        grid.innerHTML = products.map(product => {
          const image = product.images && product.images[0] ? product.images[0] : null;
          return `
          <a href="product.html?id=${product.id}" class="card">
            <div class="card-img">
              ${image ? `<img src="${image}" alt="${product.name}" loading="lazy">` : ''}
            </div>
            <div class="card-info">
              <span class="card-name">${product.name}</span>
              <span class="card-price">${formatPrice(product.price, product.currency)}</span>
            </div>
          </a>`;
        }).join('');
      } catch (err) {
        console.error('Failed to load products:', err.message);
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;opacity:0.5;">Error loading products.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadProducts);
  </script>

  <script>
    (function () {
      var vid = document.getElementById('heroVideo');
      var restartTimer = null;
      var retryInterval = null;
      var retryDeadline = 0;

      // Belt-and-suspenders: some browsers only respect the muted *property* for autoplay
      vid.muted = true;
      vid.defaultMuted = true;
      vid.setAttribute('muted', '');
      vid.setAttribute('playsinline', '');

      function tryPlay() {
        if (!vid.paused) return;
        var p = vid.play();
        if (p && typeof p.catch === 'function') {
          p.catch(function (err) { console.warn('hero video play rejected:', err); });
        }
      }

      function startRetry() {
        if (retryInterval) return;
        retryDeadline = Date.now() + 8000;
        retryInterval = setInterval(function () {
          if (!vid.paused || Date.now() > retryDeadline) {
            clearInterval(retryInterval);
            retryInterval = null;
            return;
          }
          tryPlay();
        }, 400);
      }

      function fadeOut() {
        vid.classList.remove('visible');
        restartTimer = setTimeout(function () {
          vid.currentTime = 0;
          tryPlay();
        }, 5000);
      }

      vid.addEventListener('ended', fadeOut);

      vid.addEventListener('playing', function () {
        clearTimeout(restartTimer);
        if (retryInterval) { clearInterval(retryInterval); retryInterval = null; }
        vid.classList.add('visible');
      });

      vid.addEventListener('error', function () {
        console.error('hero video failed to load:', vid.error && vid.error.message);
      });

      // Hit play on every readiness milestone — whichever fires first wins
      ['loadedmetadata', 'loadeddata', 'canplay', 'canplaythrough'].forEach(function (ev) {
        vid.addEventListener(ev, tryPlay);
      });

      // Kick off ASAP; if it's already playing from the autoplay attribute, mark visible
      tryPlay();
      if (!vid.paused) vid.classList.add('visible');
      startRetry();

      // Last-resort gesture fallback for browsers that fully block muted autoplay (e.g. iOS Low Power Mode)
      function userKick() { tryPlay(); }
      ['pointerdown', 'touchstart', 'scroll'].forEach(function (ev) {
        window.addEventListener(ev, userKick, { once: true, passive: true, capture: true });
      });
    })();
  </script>
