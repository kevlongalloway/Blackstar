<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLACKSTAR</title>
  <meta property="og:title" content="BLACKSTAR">
  <meta property="og:description" content="The Void Series — BLACKSTAR">
  <meta property="og:image" content="https://blackstarthebrand.onrender.com/IMG_1306.jpeg">
  <meta property="og:url" content="https://blackstarthebrand.onrender.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://blackstarthebrand.onrender.com/IMG_1306.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow-x: hidden;
    }

    body {
      background: #080808;
      color: #f0ede8;
      font-family: 'Space Mono', monospace;
      cursor: crosshair;
      overflow-x: hidden;
      width: 100%;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      opacity: 0.8;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      font-size: 10px;
      color: #f0ede8;
      text-decoration: none;
      letter-spacing: 0.2em;
      opacity: 0.5;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }

    /* Hero */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .hero-logo {
      width: min(680px, 82vw);
    }

    .hero-sub {
      font-size: 10px;
      letter-spacing: 0.4em;
      opacity: 0.35;
      margin-top: 40px;
      text-transform: uppercase;
    }

    .hero-icon {
      position: absolute;
      bottom: 14%;
      right: 7%;
      width: 90px;
      opacity: 0.06;
    }

    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.3em;
      opacity: 0.25;
      text-transform: uppercase;
    }

    /* Ticker */
    .ticker {
      overflow: hidden;
      background: #f0ede8;
      padding: 11px 0;
      white-space: nowrap;
    }

    .ticker-inner {
      display: inline-flex;
      animation: tick 18s linear infinite;
    }

    .ticker-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: #080808;
      padding: 0 32px;
      letter-spacing: 0.15em;
    }

    @keyframes tick {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* Shop section */
    .shop {
      padding: 80px 24px;
    }

    @media (min-width: 640px) {
      .shop { padding: 100px 40px; }
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }

    .shop-label {
      font-size: 9px;
      letter-spacing: 0.35em;
      opacity: 0.35;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .shop-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 9vw, 120px);
      line-height: 0.92;
    }

    .shop-all-link {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #f0ede8;
      text-decoration: none;
      opacity: 0.45;
      border-bottom: 1px solid rgba(240,237,232,0.25);
      padding-bottom: 2px;
      white-space: nowrap;
      transition: opacity 0.2s;
      flex-shrink: 0;
      margin-bottom: 6px;
    }

    .shop-all-link:hover { opacity: 1; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
    }

    .card {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card-img {
      aspect-ratio: 3/4;
      background: #121212;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img img {
      transform: scale(1.06);
    }

    .card-info {
      padding: 12px 2px 4px;
    }

    .card-name {
      display: block;
      font-size: 10px;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price {
      display: block;
      font-size: 10px;
      opacity: 0.45;
    }

    /* Shop all CTA */
    .shop-cta {
      margin-top: 48px;
      text-align: center;
    }

    .shop-cta-btn {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #080808;
      background: #f0ede8;
      text-decoration: none;
      padding: 14px 36px;
      transition: opacity 0.2s;
    }

    .shop-cta-btn:hover { opacity: 0.75; }

    /* Footer */
    footer {
      background: #f0ede8;
      color: #080808;
      padding: 60px 24px 36px;
    }

    @media (min-width: 640px) {
      footer { padding: 60px 40px 36px; }
    }

    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(8,8,8,0.12);
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 24px;
    }

    footer img { width: 200px; }

    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }

    .footer-links a {
      font-size: 10px;
      color: #080808;
      text-decoration: none;
      letter-spacing: 0.15em;
      opacity: 0.4;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .footer-links a:hover { opacity: 1; }

    .footer-copy {
      font-size: 9px;
      opacity: 0.3;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-mark">BST★</span>
    <div class="nav-links">
      <a href="products.html">Shop</a>
      <a href="#">Drops</a>
      <a href="#">About</a>
      <a href="#">Cart (0)</a>
    </div>
  </nav>

  <section class="hero">
    <img class="hero-logo" src="IMG_1309.png" alt="BLACKSTAR">
    <p class="hero-sub">SS26 — Now Available</p>
    <img class="hero-icon" src="IMG_1306.jpeg" alt="">
    <span class="scroll-hint">Scroll</span>
  </section>

  <div class="ticker">
    <div class="ticker-inner">
      <span class="ticker-item">BLACKSTAR</span><span class="ticker-item">★</span>
      <span class="ticker-item">NEW DROP</span><span class="ticker-item">★</span>
      <span class="ticker-item">SS26</span><span class="ticker-item">★</span>
      <span class="ticker-item">LIMITED</span><span class="ticker-item">★</span>
      <span class="ticker-item">BLACKSTAR</span><span class="ticker-item">★</span>
      <span class="ticker-item">NEW DROP</span><span class="ticker-item">★</span>
      <span class="ticker-item">SS26</span><span class="ticker-item">★</span>
      <span class="ticker-item">LIMITED</span><span class="ticker-item">★</span>
    </div>
  </div>

  <section class="shop">
    <div class="shop-header">
      <div>
        <p class="shop-label">— Current Drop</p>
        <h2 class="shop-title">THE<br>VOID<br>SERIES</h2>
      </div>
      <a href="products.html" class="shop-all-link">Shop All →</a>
    </div>

    <div class="grid" id="products-grid"></div>

    <div class="shop-cta">
      <a href="products.html" class="shop-cta-btn">View All Products</a>
    </div>
  </section>

  <footer>
    <div class="footer-top">
      <img src="IMG_1309.png" alt="BLACKSTAR">
      <div class="footer-links">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">Sizing</a>
        <a href="#">Returns</a>
      </div>
    </div>
    <p class="footer-copy">© 2026 BLACKSTAR</p>
  </footer>

  <script>
    async function loadProducts() {
      try {
        const response = await fetch('products.json');
        const data = await response.json();
        const allProducts = Array.isArray(data) ? data : (data.products || []);
        const products = allProducts.slice(0, 6);

        const grid = document.getElementById('products-grid');

        if (products.length === 0) {
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">No products available.</p>';
          return;
        }

        grid.innerHTML = products.map(product => {
          const image = product.image
            ? product.image
            : (product.images && product.images[0] ? product.images[0].src : null);
          const price = product.price
            ? product.price
            : (product.variants && product.variants[0] ? product.variants[0].price : '0');
          const url = `https://blackstarthebrand.myshopify.com/products/${product.handle}`;
          return `
          <a href="${url}" class="card" target="_blank">
            <div class="card-img">
              ${image ? `<img src="${image}" alt="${product.title}" loading="lazy">` : ''}
            </div>
            <div class="card-info">
              <span class="card-name">${product.title}</span>
              <span class="card-price">$${parseFloat(price).toFixed(2)}</span>
            </div>
          </a>`;
        }).join('');
      } catch (error) {
        console.error('Failed to load products:', error);
        document.getElementById('products-grid').innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">Error loading products</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadProducts);
  </script>

</body>
</html>
