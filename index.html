<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLACKSTAR</title>
  <meta property="og:title" content="BLACKSTAR">
  <meta property="og:description" content="The Void Series — BLACKSTAR">
  <meta property="og:image" content="https://blackstarthebrand.onrender.com/IMG_1306.jpeg">
  <meta property="og:url" content="https://blackstarthebrand.onrender.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://blackstarthebrand.onrender.com/IMG_1306.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow-x: hidden; }

    body {
      background: #080808;
      color: #f0ede8;
      font-family: 'Space Mono', monospace;
      cursor: crosshair;
      overflow-x: hidden;
      width: 100%;
    }

    /* ── Scroll progress bar ── */
    #scroll-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: #f0ede8;
      z-index: 999;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.4s ease, padding 0.4s ease;
    }
    nav.scrolled {
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 18px 40px;
    }
    .nav-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      opacity: 0.8;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      font-size: 10px;
      color: #f0ede8;
      text-decoration: none;
      letter-spacing: 0.2em;
      opacity: 0.5;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }

    /* ── Hero: fixed so it never moves during the animation.
          #hero-wrap is a 190vh scroll spacer:
            0–90vh  → animation plays (p 0→1)
            90–190vh → hero slides up at scroll speed, next section rises from below ── */
    #hero-wrap {
      height: 190vh;
    }
    .hero {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 100vh;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      will-change: transform;
    }

    /* ── Logo ── */
    .hero-logo {
      position: relative;
      width: min(680px, 82vw);
      z-index: 1;
    }
    .logo-sizer {
      width: 100%;
      display: block;
      visibility: hidden;
    }
    .logo-clip {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      clip-path: inset(0 var(--cr) 0 var(--cl));
      animation: clip-slam 0.2s cubic-bezier(0.6, 0, 0.1, 1) var(--d) both;
      transform-origin: center center;
      will-change: transform, opacity;
    }
    @keyframes clip-slam {
      0%   { opacity: 0; transform: translateY(-22px) rotate(calc(var(--rot) * 2)) scale(1.04); }
      65%  { opacity: 1; transform: translateY(1px)   rotate(var(--rot))           scale(0.995); }
      100% { opacity: 1; transform: translateY(0)     rotate(var(--rot))           scale(1); }
    }

    /* ── Central void star ── */
    #hero-star {
      position: absolute;
      top: 50%;
      left: 50%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 60vw;
      line-height: 1;
      color: #f0ede8;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      z-index: 2;
      will-change: transform, opacity;
      user-select: none;
    }

    /* ── White flash ── */
    #hero-flash {
      position: absolute;
      inset: 0;
      background: #f0ede8;
      opacity: 0;
      pointer-events: none;
      z-index: 3;
      will-change: opacity;
    }

    /* ── Dark void curtain ── */
    #hero-curtain {
      position: absolute;
      inset: 0;
      background: #080808;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      will-change: opacity;
    }

    /* ── Sub text ── */
    .hero-sub {
      font-size: 10px;
      letter-spacing: 0.4em;
      opacity: 0;
      margin-top: 40px;
      text-transform: uppercase;
      z-index: 1;
      animation: fade-in-sub 0.6s ease 0.9s forwards;
      will-change: opacity;
    }
    @keyframes fade-in-sub {
      to { opacity: 0.35; }
    }

    /* ── Scroll hint ── */
    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.35em;
      opacity: 0;
      text-transform: uppercase;
      z-index: 1;
      animation: fade-in-hint 0.5s ease 1.3s forwards;
      will-change: opacity;
    }
    @keyframes fade-in-hint {
      to { opacity: 0.2; }
    }
    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 24px;
      background: #f0ede8;
      margin: 9px auto 0;
      animation: line-pulse 1.8s ease-in-out 1.3s infinite;
      transform-origin: top center;
    }
    @keyframes line-pulse {
      0%, 100% { transform: scaleY(0.35); opacity: 0.15; }
      50%       { transform: scaleY(1);    opacity: 0.5; }
    }

    /* ── Ticker ── */
    .ticker {
      overflow: hidden;
      background: #f0ede8;
      padding: 11px 0;
      white-space: nowrap;
    }
    .ticker-inner {
      display: inline-flex;
      animation: tick 18s linear infinite;
    }
    .ticker-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: #080808;
      padding: 0 32px;
      letter-spacing: 0.15em;
    }
    @keyframes tick {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Shop section ── */
    .shop { padding: 80px 24px; }
    @media (min-width: 640px) { .shop { padding: 100px 40px; } }

    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }
    .shop-label {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .shop-label.visible { opacity: 0.35; transform: translateY(0); }

    .shop-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 9vw, 120px);
      line-height: 0.92;
    }
    .title-word { display: block; overflow: hidden; }
    .title-word-inner {
      display: block;
      transform: translateY(110%);
      transition: transform 0.5s cubic-bezier(0.6, 0, 0.1, 1);
    }
    .title-word-inner.visible { transform: translateY(0); }

    .shop-all-link {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #f0ede8;
      text-decoration: none;
      opacity: 0;
      border-bottom: 1px solid rgba(240,237,232,0.25);
      padding-bottom: 2px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-bottom: 6px;
      transition: opacity 0.4s ease 0.3s;
    }
    .shop-all-link:hover { opacity: 1 !important; }
    .shop-all-link.visible { opacity: 0.45; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }
    .card {
      text-decoration: none;
      color: inherit;
      display: block;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.6, 0, 0.1, 1);
    }
    .card.visible { opacity: 1; transform: translateY(0); }
    .card-img {
      aspect-ratio: 3/4;
      background: #121212;
      overflow: hidden;
      position: relative;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0, 0, 1);
    }
    .card:hover .card-img img { transform: scale(1.07); }
    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(240,237,232,0.05) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .card:hover .card-img::after { opacity: 1; }
    .card-info { padding: 12px 2px 4px; }
    .card-name {
      display: block;
      font-size: 10px;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-price { display: block; font-size: 10px; opacity: 0.45; }

    /* ── CTA ── */
    .shop-cta {
      margin-top: 48px;
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
    }
    .shop-cta.visible { opacity: 1; transform: translateY(0); }
    .shop-cta-btn {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #080808;
      background: #f0ede8;
      text-decoration: none;
      padding: 14px 36px;
      position: relative;
      overflow: hidden;
    }
    .shop-cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #080808;
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.6, 0, 0.1, 1);
    }
    .shop-cta-btn:hover::before { transform: translateX(0); }
    .shop-cta-btn span {
      position: relative;
      z-index: 1;
      transition: color 0.35s ease;
    }
    .shop-cta-btn:hover span { color: #f0ede8; }

    /* ── Footer ── */
    footer { background: #f0ede8; color: #080808; padding: 60px 24px 36px; }
    @media (min-width: 640px) { footer { padding: 60px 40px 36px; } }
    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(8,8,8,0.12);
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 24px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.6, 0, 0.1, 1);
    }
    .footer-top.visible { opacity: 1; transform: translateY(0); }
    footer img { width: 200px; }
    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .footer-links a {
      font-size: 10px;
      color: #080808;
      text-decoration: none;
      letter-spacing: 0.15em;
      opacity: 0.4;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .footer-links a:hover { opacity: 1; }
    .footer-copy { font-size: 9px; opacity: 0.3; letter-spacing: 0.1em; }
  </style>
</head>

  <nav id="main-nav">

        <img class="logo-clip" src="IMG_1309.png" alt="" style="--cl:11.11%; --cr:77.78%; --rot: 0.7deg; --d:0.07s">

  <div class="ticker">

  <script>
    /* ─────────────────────────────────────────
       UTILITIES
    ───────────────────────────────────────── */
    const clamp = (v, a, b) => Math.min(Math.max(v, a), b);
    const lerp  = (a, b, t) => a + (b - a) * t;

    // map v from [a1,b1] to [a2,b2], clamped
    const mr = (v, a1, b1, a2, b2) =>
      lerp(a2, b2, clamp((v - a1) / (b1 - a1), 0, 1));

    const easeIn2  = t => t * t;
    const easeIn3  = t => t * t * t;
    const easeOut2 = t => 1 - (1 - t) * (1 - t);
    const smooth   = t => t * t * (3 - 2 * t);

    /* ─────────────────────────────────────────
       ELEMENTS
    ───────────────────────────────────────── */
    const scrollBar  = document.getElementById('scroll-bar');
    const nav        = document.getElementById('main-nav');
    const heroWrap   = document.getElementById('hero-wrap');
    const heroSection= document.getElementById('hero-sticky');
    const heroStar   = document.getElementById('hero-star');
    const heroFlash  = document.getElementById('hero-flash');
    const heroCurt   = document.getElementById('hero-curtain');
    const heroSub    = document.getElementById('hero-sub');
    const scrollHint = document.getElementById('scroll-hint');
    const clips      = Array.from(document.querySelectorAll('.logo-clip'));

    /* ─────────────────────────────────────────
       SCATTER VECTORS  (dx=vw, dy=vh, dr=deg)
       9 strips fly outward in a pinwheel
    ───────────────────────────────────────── */
    const VECTORS = [
      { dx: -130, dy: -45, dr: -220 },  // 0 — far-left  → upper-left
      { dx:  -95, dy: -85, dr:  170 },  // 1             → upper-left
      { dx:  -50, dy:-115, dr: -140 },  // 2             → upper
      { dx:  -15, dy:-130, dr:  110 },  // 3             → upper
      { dx:    0, dy: -30, dr: -360 },  // 4 — center    → spins, fades
      { dx:   15, dy: 130, dr:  110 },  // 5             → lower
      { dx:   50, dy: 115, dr: -140 },  // 6             → lower
      { dx:   95, dy:  85, dr:  170 },  // 7             → lower-right
      { dx:  130, dy:  45, dr: -220 },  // 8 — far-right → lower-right
    ];

    /* Resting rotation for each clip (mirrors --rot in HTML) */
    const REST_ROTS = [-1.8, 0.7, -0.5, 1.4, -1.1, 1.6, -0.4, 0.8, -1.3];

    /* Kill CSS animations after slam completes, hand control to JS */
    let clipsReady = false;
    setTimeout(() => {
      clips.forEach((clip, i) => {
        clip.style.transform = `translateY(0) rotate(${REST_ROTS[i]}deg) scale(1)`;
        clip.style.opacity = '1';
        clip.style.animation = 'none';
      });
      clipsReady = true;
    }, 1100);

    /* ─────────────────────────────────────────
       HERO SCROLL RANGE
       heroWrap = 190vh  →  scrollRange = 90vh
    ───────────────────────────────────────── */
    let heroScrollRange = 1;
    const calcRange = () => {
      heroScrollRange = heroWrap.offsetHeight - window.innerHeight;
    };
    calcRange();
    window.addEventListener('resize', calcRange);

    /* ─────────────────────────────────────────
       MAIN SCROLL EFFECT

       Timeline (p = 0 → 1)  — hero is fixed, never moves:
         0.00 → 0.18   sub-text + hint fade out
         0.05 → 0.55   logo strips scatter + thin
         0.25 → 0.58   scattered strips fade out
         0.50 → 0.72   void star blooms
         0.60 → 0.72   star rotates fast, expands
         0.70 → 0.76   white flash
         0.74 → 0.82   star collapses
         0.80 → 1.00   dark curtain falls

       Exit phase (scrollY > heroScrollRange):
         Hero slides up at native scroll speed while the
         next section rises naturally from below.
         No snaps, no state machines — pure scroll math.
    ───────────────────────────────────────── */
    function updateHero() {
      const sy = window.scrollY;

      /* ── Exit phase: hero slides upward, next section rises ── */
      const exitPx = Math.max(0, sy - heroScrollRange);
      heroSection.style.transform = exitPx > 0 ? `translateY(-${exitPx}px)` : '';

      /* Once fully off-screen, pull it out of the stacking context */
      if (exitPx >= window.innerHeight) {
        heroSection.style.visibility = 'hidden';
        return;
      }
      heroSection.style.visibility = '';

      /* During exit the curtain stays fully opaque — nothing to update inside */
      if (exitPx > 0) return;

      /* ── Animation phase (p: 0 → 1) ── */
      const p = clamp(sy / heroScrollRange, 0, 1);

      /* — Text fade-out — */
      heroSub.style.opacity    = mr(p, 0, 0.18, 0.35, 0);
      scrollHint.style.opacity = mr(p, 0, 0.14, 0.2, 0);

      /* — Clip scatter — */
      if (clipsReady) {
        const sp = easeIn2(mr(p, 0.05, 0.55, 0, 1));
        const fp = mr(p, 0.25, 0.58, 1, 0);
        clips.forEach((clip, i) => {
          const v   = VECTORS[i];
          const tx  = sp * v.dx;
          const ty  = sp * v.dy;
          const rot = REST_ROTS[i] + sp * v.dr;
          const sx  = 1 - sp * 0.75;
          clip.style.transform =
            `translate(${tx}vw, ${ty}vh) rotate(${rot}deg) scaleX(${Math.max(sx, 0.05)})`;
          clip.style.opacity = fp;
        });
      }

      /* — Void star bloom — */
      let starOpacity = 0, starScale = 0, starRot = 0;
      if (p >= 0.50 && p < 0.74) {
        const inP = smooth(mr(p, 0.50, 0.68, 0, 1));
        starOpacity = inP;
        starScale   = inP * 1.1;
        starRot     = mr(p, 0.50, 0.74, 0, -120);
      }

      /* — Star collapse — */
      if (p >= 0.74 && p <= 0.84) {
        const colP = easeIn3(mr(p, 0.74, 0.84, 0, 1));
        starOpacity = 1 - colP;
        starScale   = 1.1 * (1 - colP);
        starRot     = -120 - colP * 240;
      }

      heroStar.style.opacity   = Math.max(0, starOpacity);
      heroStar.style.transform =
        `translate(-50%, -50%) scale(${Math.max(0, starScale)}) rotate(${starRot}deg)`;

      /* — White flash — */
      const flashP = p >= 0.72 && p <= 0.80
        ? Math.sin(mr(p, 0.72, 0.80, 0, Math.PI))
        : 0;
      heroFlash.style.opacity = flashP * 0.85;

      /* — Dark curtain — */
      heroCurt.style.opacity = easeIn2(mr(p, 0.82, 1.0, 0, 1));
    }

    /* ─────────────────────────────────────────
       SCROLL PROGRESS BAR + NAV
    ───────────────────────────────────────── */
    function updateScrollBar() {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      scrollBar.style.width = (total > 0 ? (window.scrollY / total) * 100 : 0) + '%';
    }

    function updateNav() {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    }

    /* ─────────────────────────────────────────
       RAF LOOP
    ───────────────────────────────────────── */
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          updateScrollBar();
          updateNav();
          updateHero();
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    updateNav();

    /* ─────────────────────────────────────────
       INTERSECTION OBSERVER — section reveals
    ───────────────────────────────────────── */
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

    const titleIO = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.querySelectorAll('.title-word-inner').forEach((w, i) => {
            setTimeout(() => w.classList.add('visible'), i * 90);
          });
          titleIO.unobserve(e.target);
        }
      });
    }, { threshold: 0.2 });

    /* ─────────────────────────────────────────
       PRODUCTS
    ───────────────────────────────────────── */
    async function loadProducts() {
      try {
        const data = await fetch('products.json').then(r => r.json());
        const all  = Array.isArray(data) ? data : (data.products || []);
        const products = all.slice(0, 6);
        const grid = document.getElementById('products-grid');

        if (!products.length) {
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;opacity:.5">No products available.</p>';
          return;
        }

        grid.innerHTML = products.map(p => {
          const img   = p.image || (p.images?.[0]?.src ?? null);
          const price = p.price || p.variants?.[0]?.price || '0';
          const url   = `https://blackstarthebrand.myshopify.com/products/${p.handle}`;
          return `
            <a href="${url}" class="card" target="_blank">
              <div class="card-img">
                ${img ? `<img src="${img}" alt="${p.title}" loading="lazy">` : ''}
              </div>
              <div class="card-info">
                <span class="card-name">${p.title}</span>
                <span class="card-price">$${parseFloat(price).toFixed(2)}</span>
              </div>
            </a>`;
        }).join('');

        document.querySelectorAll('.card').forEach((card, i) => {
          card.style.transitionDelay = `${i * 65}ms`;
          io.observe(card);
        });
      } catch (err) {
        document.getElementById('products-grid').innerHTML =
          '<p style="grid-column:1/-1;text-align:center;opacity:.5">Error loading products</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadProducts();
      io.observe(document.getElementById('shop-label'));
      io.observe(document.getElementById('shop-all-link'));
      io.observe(document.getElementById('shop-cta'));
      io.observe(document.getElementById('footer-reveal'));
      titleIO.observe(document.getElementById('shop-title'));
    });
  </script>

</body>
</html>
