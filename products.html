<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — BLACKSTAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      background: #080808;
      color: #f0ede8;
      font-family: 'Space Mono', monospace;
      cursor: crosshair;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      padding: 28px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media (min-width: 640px) {
      nav { padding: 28px 40px; }
    }

    .nav-mark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      opacity: 0.8;
      text-decoration: none;
      color: #f0ede8;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      font-size: 10px;
      color: #f0ede8;
      text-decoration: none;
      letter-spacing: 0.2em;
      opacity: 0.5;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }
    .nav-links a.active { opacity: 1; }

    /* Page header */
    .page-header {
      padding: 140px 24px 48px;
      border-bottom: 1px solid rgba(240,237,232,0.08);
      margin-bottom: 48px;
      overflow: hidden;
    }

    @media (min-width: 640px) {
      .page-header { padding: 140px 40px 48px; }
    }

    .page-label {
      font-size: 9px;
      letter-spacing: 0.35em;
      opacity: 0.35;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 9vw, 120px);
      line-height: 0.92;
    }

    .product-count {
      font-size: 9px;
      letter-spacing: 0.2em;
      opacity: 0.3;
      margin-top: 20px;
      text-transform: uppercase;
    }

    /* Grid */
    .shop {
      padding: 0 24px 80px;
      width: 100%;
    }

    @media (min-width: 640px) {
      .shop { padding: 0 40px 100px; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
    }

    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .card {
      text-decoration: none;
      color: inherit;
      display: block;
      min-width: 0;
    }

    .card-img {
      aspect-ratio: 3/4;
      background: #121212;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img img {
      transform: scale(1.06);
    }

    .card-info {
      padding: 12px 2px 4px;
    }

    .card-name {
      display: block;
      font-size: 10px;
      letter-spacing: 0.04em;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price {
      display: block;
      font-size: 10px;
      opacity: 0.45;
    }

    /* Loading / empty states */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      opacity: 0.4;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 60px 0;
    }

    /* Footer */
    footer {
      background: #f0ede8;
      color: #080808;
      padding: 60px 24px 36px;
    }

    @media (min-width: 640px) {
      footer { padding: 60px 40px 36px; }
    }

    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(8,8,8,0.12);
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 24px;
    }

    footer img { width: 200px; }

    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }

    .footer-links a {
      font-size: 10px;
      color: #080808;
      text-decoration: none;
      letter-spacing: 0.15em;
      opacity: 0.4;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .footer-links a:hover { opacity: 1; }

    .footer-copy {
      font-size: 9px;
      opacity: 0.3;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-mark" href="index.html">BST★</a>
    <div class="nav-links">
      <a href="products.html" class="active">Shop</a>
      <a href="#">Drops</a>
      <a href="#">About</a>
      <a href="#">Cart (0)</a>
    </div>
  </nav>

  <div class="page-header">
    <p class="page-label">— All Products</p>
    <h1 class="page-title">SHOP</h1>
    <p class="product-count" id="product-count"></p>
  </div>

  <section class="shop">
    <div class="grid" id="products-grid">
      <p class="state-msg">Loading...</p>
    </div>
  </section>

  <footer>
    <div class="footer-top">
      <img src="IMG_1309.png" alt="BLACKSTAR">
      <div class="footer-links">
        <a href="#">Instagram</a>
        <a href="#">TikTok</a>
        <a href="#">Sizing</a>
        <a href="#">Returns</a>
      </div>
    </div>
    <p class="footer-copy">© 2026 BLACKSTAR</p>
  </footer>

  <script>
    async function loadProducts() {
      try {
        const response = await fetch('products.json');
        const data = await response.json();
        const products = Array.isArray(data) ? data : (data.products || []);

        const grid = document.getElementById('products-grid');
        const countEl = document.getElementById('product-count');

        if (products.length === 0) {
          grid.innerHTML = '<p class="state-msg">No products available.</p>';
          return;
        }

        countEl.textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;

        grid.innerHTML = products.map(product => {
          const image = product.image
            ? product.image
            : (product.images && product.images[0] ? product.images[0].src : null);
          const price = product.price
            ? product.price
            : (product.variants && product.variants[0] ? product.variants[0].price : '0');
          const url = `https://blackstarthebrand.myshopify.com/products/${product.handle}`;
          return `
          <a href="${url}" class="card" target="_blank">
            <div class="card-img">
              ${image ? `<img src="${image}" alt="${product.title}" loading="lazy">` : ''}
            </div>
            <div class="card-info">
              <span class="card-name">${product.title}</span>
              <span class="card-price">$${parseFloat(price).toFixed(2)}</span>
            </div>
          </a>`;
        }).join('');
      } catch (error) {
        console.error('Failed to load products:', error);
        document.getElementById('products-grid').innerHTML = '<p class="state-msg">Error loading products.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadProducts);
  </script>

</body>
</html>
